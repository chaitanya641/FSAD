<!DOCTYPE html>
<html>
<head>
    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mini E-Commerce Store</h1>
        <button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h3>Laptop</h3>
            <p>₹50000</p>
            <button onclick="addToCart('Laptop',50000)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h3>Mobile</h3>
            <p>₹20000</p>
            <button onclick="addToCart('Mobile',20000)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h3>Headphones</h3>
            <p>₹2000</p>
            <button onclick="addToCart('Headphones',2000)">Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h3>Computer</h3>
            <p>₹200000</p>
            <button onclick="addToCart('Computer',200000)">Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150">
            <h3>MacBook</h3>
            <p>₹500000</p>
            <button onclick="addToCart('MacBook',500000)">Add to Cart</button>
        </div>

    </section>

    <div class="cart" id="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <button onclick="clearCart()">Clear Cart</button>
    </div>

<script src="script.js"></script>
</body>
</html>
